name: CI - iOS

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradlew'
      - 'gradle/wrapper/**'
      - 'RSVPNanoCompanion/conversionCore/**'
      - 'RSVPNanoCompanion/shared/**'
      - 'RSVPNanoCompanion/ios/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradlew'
      - 'gradle/wrapper/**'
      - 'RSVPNanoCompanion/conversionCore/**'
      - 'RSVPNanoCompanion/shared/**'
      - 'RSVPNanoCompanion/ios/**'
      - '.github/workflows/**'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Run iOS checks
        run: bash ./gradlew checkIos --no-daemon
      - name: Upload Gradle reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-gradle-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
      - name: Build shared XCFramework
        run: bash RSVPNanoCompanion/tools/build_shared_xcframework.sh
      - name: Upload shared artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shared-xcframework
          path: RSVPNanoCompanion/ios/RSVPNanoCompanion/SharedFrameworks/shared.xcframework
