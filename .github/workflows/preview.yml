name: Preview firmware

on:
  push:
    tags:
      - "preview-*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Preview tag/release name, for example preview-sd-fix"
        required: true
        default: "preview-manual"
      label:
        description: "Optional release title"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  firmware:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set preview metadata
        id: preview
        env:
          DISPATCH_CHANNEL: ${{ inputs.channel }}
          LABEL: ${{ inputs.label }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANNEL="$DISPATCH_CHANNEL"
          else
            CHANNEL="$GITHUB_REF_NAME"
          fi

          SHORT_SHA="$(git rev-parse --short HEAD)"
          BUILD_SHA="$(git rev-parse HEAD)"

          if ! echo "$CHANNEL" | grep -Eq '^preview-[A-Za-z0-9._-]+$'; then
            echo "::error::Preview channel must look like preview-name, got: ${CHANNEL}"
            exit 1
          fi

          VERSION="${CHANNEL}-${SHORT_SHA}"

          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${BUILD_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [ -n "$LABEL" ]; then
            echo "title=${LABEL}" >> "$GITHUB_OUTPUT"
          else
            echo "title=Preview ${CHANNEL}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install PlatformIO
        run: pip install platformio

      - name: Find firmware export tool
        id: exporter
        shell: bash
        run: |
          EXPORTER="$(find . -type f -name 'export_web_firmware.py' -not -path './.git/*' -print -quit)"

          if [ -z "$EXPORTER" ]; then
            echo "::error::Could not find export_web_firmware.py"
            exit 1
          fi

          echo "path=$EXPORTER" >> "$GITHUB_OUTPUT"
          echo "[preview] Using firmware export tool: $EXPORTER"

      - name: Export firmware assets
        shell: bash
        run: python3 "${{ steps.exporter.outputs.path }}" --version "${{ steps.preview.outputs.version }}"

      - name: Find firmware assets
        id: assets
        shell: bash
        run: |
          FULL_BIN="$(find . -type f -name 'rsvp-nano.bin' -not -path './.git/*' -print -quit)"
          OTA_BIN="$(find . -type f -name 'rsvp-nano-ota.bin' -not -path './.git/*' -print -quit)"
          LCD349_OTA_BIN="$(find . -type f -name 'rsvp-nano-esp32-s3-touch-lcd-3.49-ota.bin' -not -path './.git/*' -print -quit)"
          REV2_FULL_BIN="$(find . -type f -name 'rsvp-nano-rev2.bin' -not -path './.git/*' -print -quit)"
          REV2_OTA_BIN="$(find . -type f -name 'rsvp-nano-rev2-ota.bin' -not -path './.git/*' -print -quit)"
          LCD349_REV2_OTA_BIN="$(find . -type f -name 'rsvp-nano-esp32-s3-touch-lcd-3.49-rev2-ota.bin' -not -path './.git/*' -print -quit)"
          AMOLED18_FULL_BIN="$(find . -type f -name 'rsvp-nano-esp32-s3-touch-amoled-1.8.bin' -not -path './.git/*' -print -quit)"
          AMOLED18_OTA_BIN="$(find . -type f -name 'rsvp-nano-esp32-s3-touch-amoled-1.8-ota.bin' -not -path './.git/*' -print -quit)"
          AMOLED18_V2_FULL_BIN="$(find . -type f -name 'rsvp-nano-esp32-s3-touch-amoled-1.8-v2.bin' -not -path './.git/*' -print -quit)"
          AMOLED18_V2_OTA_BIN="$(find . -type f -name 'rsvp-nano-esp32-s3-touch-amoled-1.8-v2-ota.bin' -not -path './.git/*' -print -quit)"
          AMOLED216_FULL_BIN="$(find . -type f -name 'rsvp-nano-esp32-s3-touch-amoled-2.16.bin' -not -path './.git/*' -print -quit)"
          AMOLED216_OTA_BIN="$(find . -type f -name 'rsvp-nano-esp32-s3-touch-amoled-2.16-ota.bin' -not -path './.git/*' -print -quit)"
          AMOLED241_FULL_BIN="$(find . -type f -name 'rsvp-nano-esp32-s3-touch-amoled-2.41.bin' -not -path './.git/*' -print -quit)"
          AMOLED241_OTA_BIN="$(find . -type f -name 'rsvp-nano-esp32-s3-touch-amoled-2.41-ota.bin' -not -path './.git/*' -print -quit)"

          if [ -z "$FULL_BIN" ] || [ -z "$OTA_BIN" ] || [ -z "$LCD349_OTA_BIN" ] || [ -z "$REV2_FULL_BIN" ] || [ -z "$REV2_OTA_BIN" ] || [ -z "$LCD349_REV2_OTA_BIN" ] || [ -z "$AMOLED18_FULL_BIN" ] || [ -z "$AMOLED18_OTA_BIN" ] || [ -z "$AMOLED18_V2_FULL_BIN" ] || [ -z "$AMOLED18_V2_OTA_BIN" ] || [ -z "$AMOLED216_FULL_BIN" ] || [ -z "$AMOLED216_OTA_BIN" ] || [ -z "$AMOLED241_FULL_BIN" ] || [ -z "$AMOLED241_OTA_BIN" ]; then
            echo "::error::Could not find firmware assets."
            echo "FULL_BIN=$FULL_BIN"
            echo "OTA_BIN=$OTA_BIN"
            echo "LCD349_OTA_BIN=$LCD349_OTA_BIN"
            echo "REV2_FULL_BIN=$REV2_FULL_BIN"
            echo "REV2_OTA_BIN=$REV2_OTA_BIN"
            echo "LCD349_REV2_OTA_BIN=$LCD349_REV2_OTA_BIN"
            echo "AMOLED18_FULL_BIN=$AMOLED18_FULL_BIN"
            echo "AMOLED18_OTA_BIN=$AMOLED18_OTA_BIN"
            echo "AMOLED18_V2_FULL_BIN=$AMOLED18_V2_FULL_BIN"
            echo "AMOLED18_V2_OTA_BIN=$AMOLED18_V2_OTA_BIN"
            echo "AMOLED216_FULL_BIN=$AMOLED216_FULL_BIN"
            echo "AMOLED216_OTA_BIN=$AMOLED216_OTA_BIN"
            echo "AMOLED241_FULL_BIN=$AMOLED241_FULL_BIN"
            echo "AMOLED241_OTA_BIN=$AMOLED241_OTA_BIN"
            exit 1
          fi

          echo "full=$FULL_BIN" >> "$GITHUB_OUTPUT"
          echo "ota=$OTA_BIN" >> "$GITHUB_OUTPUT"
          echo "lcd349_ota=$LCD349_OTA_BIN" >> "$GITHUB_OUTPUT"
          echo "rev2_full=$REV2_FULL_BIN" >> "$GITHUB_OUTPUT"
          echo "rev2_ota=$REV2_OTA_BIN" >> "$GITHUB_OUTPUT"
          echo "lcd349_rev2_ota=$LCD349_REV2_OTA_BIN" >> "$GITHUB_OUTPUT"
          echo "amoled18_full=$AMOLED18_FULL_BIN" >> "$GITHUB_OUTPUT"
          echo "amoled18_ota=$AMOLED18_OTA_BIN" >> "$GITHUB_OUTPUT"
          echo "amoled18_v2_full=$AMOLED18_V2_FULL_BIN" >> "$GITHUB_OUTPUT"
          echo "amoled18_v2_ota=$AMOLED18_V2_OTA_BIN" >> "$GITHUB_OUTPUT"
          echo "amoled216_full=$AMOLED216_FULL_BIN" >> "$GITHUB_OUTPUT"
          echo "amoled216_ota=$AMOLED216_OTA_BIN" >> "$GITHUB_OUTPUT"
          echo "amoled241_full=$AMOLED241_FULL_BIN" >> "$GITHUB_OUTPUT"
          echo "amoled241_ota=$AMOLED241_OTA_BIN" >> "$GITHUB_OUTPUT"

          echo "[preview] Full image: $FULL_BIN"
          echo "[preview] OTA image: $OTA_BIN"
          echo "[preview] Touch LCD 3.49 OTA image: $LCD349_OTA_BIN"
          echo "[preview] Touch LCD 3.49 rev2 full image: $REV2_FULL_BIN"
          echo "[preview] Touch LCD 3.49 rev2 OTA image: $LCD349_REV2_OTA_BIN"
          echo "[preview] Touch AMOLED 1.8 V1 full image: $AMOLED18_FULL_BIN"
          echo "[preview] Touch AMOLED 1.8 V1 OTA image: $AMOLED18_OTA_BIN"
          echo "[preview] Touch AMOLED 1.8 V2 test full image: $AMOLED18_V2_FULL_BIN"
          echo "[preview] Touch AMOLED 1.8 V2 test OTA image: $AMOLED18_V2_OTA_BIN"
          echo "[preview] Touch AMOLED 2.16 full image: $AMOLED216_FULL_BIN"
          echo "[preview] Touch AMOLED 2.16 OTA image: $AMOLED216_OTA_BIN"
          echo "[preview] Touch AMOLED 2.41 full image: $AMOLED241_FULL_BIN"
          echo "[preview] Touch AMOLED 2.41 OTA image: $AMOLED241_OTA_BIN"

      - name: Write preview release notes
        run: |
          cat > release-notes.md <<NOTES
          Preview firmware build.

          Tag/channel: \`${{ steps.preview.outputs.channel }}\`
          Commit: \`${{ steps.preview.outputs.commit_sha }}\`
          Build version: \`${{ steps.preview.outputs.version }}\`

          Assets:
          - \`rsvp-nano.bin\` is the full browser-flasher image for fresh installs on the Touch LCD 3.49.
          - \`rsvp-nano-ota.bin\` is the legacy app-only OTA binary for existing Touch LCD 3.49 devices.
          - \`rsvp-nano-esp32-s3-touch-lcd-3.49-ota.bin\` is the Touch LCD 3.49 OTA binary.
          - \`rsvp-nano-rev2.bin\` is the full browser-flasher image for Touch LCD 3.49 rev2/GPIO42 boards.
          - \`rsvp-nano-rev2-ota.bin\` is the legacy app-only OTA binary for Touch LCD 3.49 rev2/GPIO42 boards.
          - \`rsvp-nano-esp32-s3-touch-lcd-3.49-rev2-ota.bin\` is the Touch LCD 3.49 rev2/GPIO42 OTA binary.
          - \`rsvp-nano-esp32-s3-touch-amoled-1.8.bin\` is the full browser-flasher image for Touch AMOLED 1.8 V1 boards.
          - \`rsvp-nano-esp32-s3-touch-amoled-1.8-ota.bin\` is the Touch AMOLED 1.8 V1 OTA binary.
          - \`rsvp-nano-esp32-s3-touch-amoled-1.8-v2.bin\` is the full browser-flasher image for Touch AMOLED 1.8 V2 test boards.
          - \`rsvp-nano-esp32-s3-touch-amoled-1.8-v2-ota.bin\` is the Touch AMOLED 1.8 V2 test OTA binary.
          - \`rsvp-nano-esp32-s3-touch-amoled-2.16.bin\` is the full browser-flasher image for Touch AMOLED 2.16 boards.
          - \`rsvp-nano-esp32-s3-touch-amoled-2.16-ota.bin\` is the Touch AMOLED 2.16 OTA binary.
          - \`rsvp-nano-esp32-s3-touch-amoled-2.41.bin\` is the full browser-flasher image for Touch AMOLED 2.41 boards.
          - \`rsvp-nano-esp32-s3-touch-amoled-2.41-ota.bin\` is the Touch AMOLED 2.41 OTA binary.
          NOTES

      - name: Move preview tag to this commit
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ steps.preview.outputs.channel }}
          BUILD_SHA: ${{ steps.preview.outputs.commit_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f "$RELEASE_TAG" "$BUILD_SHA"
          git push origin "refs/tags/${RELEASE_TAG}" --force

      - name: Publish or update preview release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.preview.outputs.channel }}
          RELEASE_TITLE: ${{ steps.preview.outputs.title }}
          BUILD_SHA: ${{ steps.preview.outputs.commit_sha }}
          FULL_BIN: ${{ steps.assets.outputs.full }}
          OTA_BIN: ${{ steps.assets.outputs.ota }}
          LCD349_OTA_BIN: ${{ steps.assets.outputs.lcd349_ota }}
          REV2_FULL_BIN: ${{ steps.assets.outputs.rev2_full }}
          REV2_OTA_BIN: ${{ steps.assets.outputs.rev2_ota }}
          LCD349_REV2_OTA_BIN: ${{ steps.assets.outputs.lcd349_rev2_ota }}
          AMOLED18_FULL_BIN: ${{ steps.assets.outputs.amoled18_full }}
          AMOLED18_OTA_BIN: ${{ steps.assets.outputs.amoled18_ota }}
          AMOLED18_V2_FULL_BIN: ${{ steps.assets.outputs.amoled18_v2_full }}
          AMOLED18_V2_OTA_BIN: ${{ steps.assets.outputs.amoled18_v2_ota }}
          AMOLED216_FULL_BIN: ${{ steps.assets.outputs.amoled216_full }}
          AMOLED216_OTA_BIN: ${{ steps.assets.outputs.amoled216_ota }}
          AMOLED241_FULL_BIN: ${{ steps.assets.outputs.amoled241_full }}
          AMOLED241_OTA_BIN: ${{ steps.assets.outputs.amoled241_ota }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --target "$BUILD_SHA" \
              --prerelease
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --target "$BUILD_SHA" \
              --prerelease
          fi

          gh release upload "$RELEASE_TAG" \
            "$FULL_BIN" \
            "$OTA_BIN" \
            "$LCD349_OTA_BIN" \
            "$REV2_FULL_BIN" \
            "$REV2_OTA_BIN" \
            "$LCD349_REV2_OTA_BIN" \
            "$AMOLED18_FULL_BIN" \
            "$AMOLED18_OTA_BIN" \
            "$AMOLED18_V2_FULL_BIN" \
            "$AMOLED18_V2_OTA_BIN" \
            "$AMOLED216_FULL_BIN" \
            "$AMOLED216_OTA_BIN" \
            "$AMOLED241_FULL_BIN" \
            "$AMOLED241_OTA_BIN" \
            --clobber
