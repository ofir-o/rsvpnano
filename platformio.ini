[platformio]
default_envs = waveshare_esp32s3

[env]
platform = espressif32@6.3.2
board = esp32-s3-r8-opi
framework = arduino
monitor_speed = 115200
upload_speed = 460800
extra_scripts = pre:tools/pio_set_version.py
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DRSVP_ON_DEVICE_EPUB_CONVERSION=1
  -std=gnu++17
  -fno-exceptions
build_unflags =
  -std=gnu++11
build_src_filter =
  +<*>
  -<benchmark/**>
  -<platforms/**>
  -<drivers/audio/**>
  -<drivers/display/**>
  -<drivers/gpio/**>
  -<drivers/power/**>
  -<drivers/touch/**>

[env:waveshare_esp32s3]
build_src_filter =
  ${env.build_src_filter}
  +<platforms/waveshare_lcd_349/**>
  +<drivers/audio/es8311/**>
  +<drivers/display/axs15231b/**>
  +<drivers/touch/axs15231b_touch/**>
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_lcd_349/rev1/BoardConfig.h\"
  -DRSVP_USB_TRANSFER_ENABLED=1
build_unflags =
  -DARDUINO_USB_MODE=1

[env:waveshare_esp32s3_rev2]
build_src_filter =
  ${env.build_src_filter}
  +<platforms/waveshare_lcd_349/**>
  +<drivers/audio/es8311/**>
  +<drivers/display/axs15231b/**>
  +<drivers/touch/axs15231b_touch/**>
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_lcd_349/rev2/BoardConfig.h\"
  -DRSVP_USB_TRANSFER_ENABLED=1
build_unflags =
  -DARDUINO_USB_MODE=1

; Experimental target scaffold only. The profile exists so we can isolate 2.41-specific work
; without touching the 3.49 build, but the board backends still need to be implemented.
[env:waveshare_esp32s3_touch_amoled_241]
build_src_filter =
  ${env.build_src_filter}
  +<platforms/waveshare_amoled_241/**>
  +<drivers/display/rm690b0/**>
  +<drivers/touch/ft6336/**>
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_amoled_241/BoardConfig.h\"
  -DRSVP_USB_TRANSFER_ENABLED=1
build_unflags =
  -DARDUINO_USB_MODE=1

[env:waveshare_esp32s3_touch_amoled_18]
build_src_filter =
  ${env.build_src_filter}
  +<platforms/waveshare_amoled_18/**>
  +<drivers/audio/es8311/**>
  +<drivers/display/sh8601/**>
  +<drivers/touch/ft6336/**>
  +<drivers/power/axp2101/**>
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_amoled_18/BoardConfig.h\"
  -DRSVP_USB_TRANSFER_ENABLED=1
build_unflags =
  -DARDUINO_USB_MODE=1

[env:waveshare_esp32s3_touch_amoled_18_v2]
build_src_filter =
  ${env.build_src_filter}
  +<platforms/waveshare_amoled_18/**>
  -<platforms/waveshare_amoled_18/BoardDisplay.cpp>
  +<platforms/waveshare_amoled_18_v2/**>
  +<drivers/audio/es8311/**>
  +<drivers/display/co5300/**>
  +<drivers/touch/ft6336/**>
  +<drivers/power/axp2101/**>
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_amoled_18_v2/BoardConfig.h\"
  -DRSVP_USB_TRANSFER_ENABLED=1
build_unflags =
  -DARDUINO_USB_MODE=1

[env:waveshare_esp32s3_touch_amoled_216]
build_src_filter =
  ${env.build_src_filter}
  +<platforms/waveshare_amoled_216/**>
  +<drivers/audio/es8311/**>
  +<drivers/display/co5300/**>
  +<drivers/touch/cst92xx/**>
  +<drivers/power/axp2101/**>
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_amoled_216/BoardConfig.h\"
  -DRSVP_USB_TRANSFER_ENABLED=1
build_unflags =
  -DARDUINO_USB_MODE=1

[env:waveshare_esp32s3_touch_amoled_175]
; Round 466x466 AMOLED with no microSD slot: the library lives on an internal-flash FAT
; partition (custom 16 MB table). USB mass-storage transfer stays enabled and exposes that
; FFat partition to the host, so books load over USB with no Wi-Fi required.
board_build.partitions = partitions_16MB_ffat.csv
build_src_filter =
  ${env.build_src_filter}
  +<platforms/waveshare_amoled_175/**>
  +<drivers/audio/es8311/**>
  +<drivers/display/co5300/**>
  +<drivers/touch/cst92xx/**>
  +<drivers/power/axp2101/**>
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/waveshare_amoled_175/BoardConfig.h\"
  -DRSVP_USB_TRANSFER_ENABLED=1
build_unflags =
  -DARDUINO_USB_MODE=1

[env:benchmark_waveshare_esp32s3]
extends = env:waveshare_esp32s3
build_src_filter =
  ${env:waveshare_esp32s3.build_src_filter}
  +<benchmark/**>
build_flags =
  ${env:waveshare_esp32s3.build_flags}
  -DRSVP_BENCHMARK_MODE=1
monitor_filters =
  default
  time
  log2file
  esp32_exception_decoder

