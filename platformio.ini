[env:native_test]
platform = native
framework =
test_framework = unity
test_filter =
  test_pacing
  test_menu_repeat
  test_release_parser
  test_feed_parser
  test_life_grid
test_build_src = yes
build_src_filter =
  -<*>
  +<reader/ReadingLoop.cpp>
  +<update/ReleaseParser.cpp>
  +<rss/FeedParser.cpp>
  +<standby/LifeGrid.cpp>
build_flags =
  -std=c++17
  -Itest/support
  -Isrc
