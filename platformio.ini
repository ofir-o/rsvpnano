[platformio]
default_envs = waveshare_esp32s3_usb_msc

[env]
platform = espressif32@6.3.2
board = esp32-s3-r8-opi
framework = arduino
monitor_speed = 115200
upload_speed = 460800
extra_scripts = pre:tools/pio_set_version.py
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DRSVP_ON_DEVICE_EPUB_CONVERSION=1

[env:waveshare_esp32s3]
build_flags =
  ${env.build_flags}
  -DRSVP_BOARD_WAVESHARE_ESP32S3_TOUCH_LCD_349=1
  -DRSVP_USB_TRANSFER_ENABLED=0

[env:waveshare_esp32s3_usb_msc]
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DRSVP_BOARD_WAVESHARE_ESP32S3_TOUCH_LCD_349=1
  -DRSVP_USB_TRANSFER_ENABLED=1
build_unflags =
  -DARDUINO_USB_MODE=1

; Experimental target scaffold only. The profile exists so we can isolate 2.41-specific work
; without touching the 3.49 build, but the board backends still need to be implemented.
[env:waveshare_esp32s3_touch_amoled_241]
build_flags =
  ${env.build_flags}
  -DRSVP_BOARD_WAVESHARE_ESP32S3_TOUCH_AMOLED_241=1
  -DRSVP_USB_TRANSFER_ENABLED=0

[env:waveshare_esp32s3_touch_amoled_18]
build_flags =
  ${env.build_flags}
  -DRSVP_BOARD_WAVESHARE_ESP32S3_TOUCH_AMOLED_18=1
  -DRSVP_USB_TRANSFER_ENABLED=0

[env:waveshare_esp32s3_touch_amoled_216]
build_flags =
  ${env.build_flags}
  -DRSVP_BOARD_WAVESHARE_ESP32S3_TOUCH_AMOLED_216=1
  -DRSVP_USB_TRANSFER_ENABLED=0

[env:native_test]
platform = native
framework =
test_framework = unity
test_filter = test_pacing
test_build_src = yes
build_src_filter = -<*> +<reader/ReadingLoop.cpp>
build_flags =
  -std=c++17
  -Itest/support
  -Isrc
